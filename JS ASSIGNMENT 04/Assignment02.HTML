<!DOCTYPE html>
<html>

<head>
    <title> Div Creation</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #container {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .box {
            width: 200px;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h1>Dynamic Div Creation</h1>
    <button onclick="createDiv()">Add New Div</button>

    <div id="container"></div>

    <script>
        let count = 1;

        function createDiv() {
            const newDiv = document.createElement("div");
            newDiv.className = "box";
            newDiv.innerText = "Dynamic Box " + count;
            document.getElementById("container").appendChild(newDiv);
            count++;
        }
    </script>

</body>

</html>
