<!DOCTYPE html>
<html>

<head>
    <title>Hide/Show Paragraph</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f9f9f9;
        }

        #myPara {
            margin: 20px auto;
            padding: 15px;
            width: 60%;
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

    <p id="myPara">This is a simple paragraph. Click the button to hide or show it!</p>
    <button onclick="togglePara()">Hide/Show</button>

    <script>
        function togglePara() {
            const para = document.getElementById("myPara");
            if (para.style.display === "none") {
                para.style.display = "block";
            } else {
                para.style.display = "none";
            }
        }
    </script>

</body>

</html>
