<!DOCTYPE html>
<html>
<head>
    <title>Todo List App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .container {
            background: white;
            padding: 20px;
            width: 350px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 70%;
            padding: 8px;
        }

        button {
            padding: 8px 10px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: #e3e3e3;
            margin-bottom: 8px;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            border-radius: 4px;
        }

        .delete {
            background: red;
            color: white;
            border: none;
            padding: 5px 8px;
            border-radius: 4px;
        }

        .add-btn {
            background: green;
            color: white;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Todo List</h2>
    <input type="text" id="taskInput" placeholder="Enter new task">
    <button class="add-btn" onclick="addTask()">Add</button>

    <ul id="taskList"></ul>
</div>

<script>
    let tasks = [];

    function addTask() {
        const input = document.getElementById("taskInput");
        const taskValue = input.value.trim();

        if (taskValue === "") return;

        tasks.push(taskValue);

        // Sort tasks in ascending order
        tasks.sort((a, b) => a.localeCompare(b));

        renderTasks();

        // Clear input field
        input.value = "";
    }

    function deleteTask(index) {
        tasks.splice(index, 1);
        renderTasks();
    }

    function renderTasks() {
        const list = document.getElementById("taskList");
        list.innerHTML = "";

        tasks.forEach((task, index) => {
            const li = document.createElement("li");
            li.innerHTML = `
                ${task}
                <button class="delete" onclick="deleteTask(${index})">Delete</button>
            `;
            list.appendChild(li);
        });
    }
</script>

</body>
</html>
